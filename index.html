<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Retro TV</title>
  <style>
    :root {
      --bg: #333;
      --bg2: #222;
      --panel: #444;
      --panel2: #555;
      --text: #fff;
      --accent: #ffcc00;
    }

    * { box-sizing: border-box; }

    body {
      font-family: Helvetica, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      overflow: hidden;
    }

    .container {
      display: flex;
      height: 100vh;
      width: 100vw;
    }

    /* VIDEO AREA */
    .video-section {
      position: relative;
      width: 70%;
      height: 100%;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #video-player {
      width: 78%;
      height: 78%;
      object-fit: contain;
      position: absolute;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
    }

    /* "TV off" overlay */
    .screen-off {
      position: absolute;
      width: 85%;
      height: 85%;
      top: 10%;
      left: 14%;
      z-index: 2;
      display: none;
      justify-content: center;
      align-items: center;
      background: radial-gradient(circle, #000, #111 60%, #222 80%, #000 100%);
      color: #fff;
      font-size: 1.1rem;
      pointer-events: none;
    }

    /* Static overlay as a real video layer */
    #static-overlay {
      display: none;
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 10;
      object-fit: cover;
      pointer-events: none;
      opacity: 0.55;
      mix-blend-mode: screen;
    }

    .tv-overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: url('./assets/images/tvbackclean.webp') no-repeat center center;
      background-size: contain;
      z-index: 3;
      pointer-events: none;
    }

    /* SIDEBAR */
    .sidebar {
      width: 30%;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      padding: 15px;
      overflow-y: auto;
      border-right: 3px solid var(--bg2);
      position: relative;
    }

    .sidebar::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        transparent,
        transparent 2px,
        rgba(0,0,0,0.1) 4px
      );
      pointer-events: none;
    }

    .tv-guide {
      margin-bottom: 15px;
      background: linear-gradient(to bottom, var(--panel2), var(--panel));
      border-radius: 10px;
      padding: 15px;
      box-shadow: inset 0 0 15px rgba(0,0,0,0.6);
      color: #eee;
      font-family: Verdana, sans-serif;
      position: relative;
      z-index: 1;
    }

    .tv-guide h2 {
      margin: 0 0 10px 0;
      font-size: 1.5rem;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
      color: var(--accent);
      text-transform: uppercase;
    }

    .tv-guide ul {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .tv-guide li {
      margin-bottom: 10px;
      padding: 10px;
      background: linear-gradient(to right, #666, #444);
      border-radius: 5px;
      font-size: 0.8rem;
      color: #fff;
      font-family: "Courier New", monospace;
      display: flex;
      justify-content: space-between;
      box-shadow: 0 2px 5px rgba(0,0,0,0.5);
      transition: transform 0.2s ease, background 0.2s ease;
    }

    .tv-guide li:hover {
      background: #777;
      transform: scale(1.05);
    }

    .tv-guide li.now-playing {
      background: var(--accent);
      color: #000;
      font-weight: bold;
      animation: glow 1s infinite alternate;
    }

    @keyframes glow {
      0% { box-shadow: 0 0 5px var(--accent); }
      100% { box-shadow: 0 0 15px var(--accent); }
    }

    .poster-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      background: linear-gradient(to top, #444, #222);
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 0 20px rgba(0,0,0,0.7);
      position: relative;
      z-index: 1;
    }

    .poster-container img {
      width: 180px;
      height: 240px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.8);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .poster-container img:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px rgba(255,255,255,0.8);
    }

    /* BUTTON PANEL */
    .button-panel {
      position: absolute;
      bottom: 13%;
      left: 35%;
      transform: translateX(-50%);
      display: flex;
      gap: 15px;
      z-index: 6;
    }

    .button-panel button {
      width: 12px;
      height: 12px;
      background: radial-gradient(circle, rgba(192,192,192,0.5), rgba(0,0,0,0) 70%);
      border: none;
      border-radius: 50%;
      cursor: pointer;
      transition: box-shadow 0.2s ease, background-color 0.2s ease;
      box-shadow:
        inset 0 1px 2px rgba(255,255,255,0.6),
        inset 0 -1px 2px rgba(0,0,0,0.4),
        0 0 10px rgba(192,192,192,0.6);
    }

    .button-panel button:hover {
      box-shadow:
        0 0 15px rgba(255,255,255,0.8),
        0 0 30px rgba(192,192,192,0.6);
    }

    .button-panel button:active {
      background: linear-gradient(145deg, #e0e0e0, #b0b0b0);
      box-shadow:
        inset 0 2px 5px rgba(0,0,0,0.4),
        0 0 5px rgba(255,255,255,0.5);
    }

    #power {
      width: 25px;
      height: 25px;
      box-shadow:
        inset 0 1px 2px rgba(255,255,255,0.6),
        inset 0 -1px 2px rgba(0,0,0,0.4),
        0 0 15px rgba(192,192,192,0.8);
    }

    #power-light {
      width: 25px;
      height: 25px;
      background: green;
      border-radius: 50%;
      box-shadow: 0 0 15px green;
      transition: box-shadow 0.3s ease, background-color 0.3s ease;
    }

    .spacer { width: 41px; height: 10px; }

    .notification {
      position: fixed;
      top: 70%;
      left: 35%;
      transform: translate(-50%, -50%);
      font-size: 14px;
      color: limegreen;
      background: rgba(0,0,0,0.8);
      padding: 10px 20px;
      border-radius: 5px;
      display: none;
      z-index: 15;
      text-align: center;
    }

    @media (max-width: 768px) {
      .container { flex-direction: column; }
      .video-section { width: 100%; height: 60%; }
      .sidebar { width: 100%; height: 40%; flex-direction: row; padding: 10px; }
      .poster-container img { width: 150px; height: 200px; }
      .tv-guide ul { font-size: 0.8rem; }
      .button-panel { left: 50%; }
      .notification { left: 50%; }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="video-section">
      <video id="video-player" controls></video>

      <!-- Static overlay (real video, not CSS background) -->
      <video id="static-overlay" muted loop playsinline>
        <source src="./assets/videos/tv-static.mp4" type="video/mp4" />
      </video>

      <!-- Power off overlay -->
      <div class="screen-off">POWER OFF</div>

      <div class="tv-overlay"></div>
    </div>

    <div class="sidebar">
      <div class="tv-guide" style="overflow-y:auto;">
        <h2>TV Guide</h2>
        <p id="category-info"></p>
        <p id="subcategory-info"></p>
        <ul id="tv-guide-list"></ul>
      </div>

      <div class="poster-container" id="poster-container">
        <img id="poster" src="./assets/images/default_poster.jpg" alt="Channel Poster" />
      </div>
    </div>
  </div>

  <div class="button-panel">
    <div class="button-container"><button id="shuffle"></button></div>

    <div class="button-container">
      <button id="volume-down"></button>
      <div class="button-label">Vol -</div>
    </div>

    <div class="button-container">
      <button id="volume-up"></button>
      <div class="button-label">Vol +</div>
    </div>

    <div class="button-container">
      <button id="channel-down"></button>
      <div class="button-label">Ch -</div>
    </div>

    <div class="button-container">
      <button id="channel-up"></button>
      <div class="button-label">Ch +</div>
    </div>

    <div class="button-container-large">
      <div id="power-light"></div>
    </div>

    <div class="spacer"></div>

    <div class="button-container-large">
      <button id="power"></button>
    </div>
  </div>

  <div class="notification"></div>

  <script src="./channels.js"></script>
  <script>
    const videoPlayer = document.getElementById('video-player');
    const staticOverlay = document.getElementById('static-overlay');
    const GUIDE_DEPTH = 10;

    const tvGuideList = document.getElementById('tv-guide-list');
    const categoryInfo = document.getElementById('category-info');
    const subcategoryInfo = document.getElementById('subcategory-info');

    const shuffleButton = document.getElementById('shuffle');
    const powerButton = document.getElementById('power');
    const powerLight = document.getElementById('power-light');
    const screenOffOverlay = document.querySelector('.screen-off');
    const poster = document.getElementById('poster');

    let currentChannelIndex = 0;
    let currentStartTime = new Date();
    let lastShuffleIndex = -1;

    let tvQueue = [];  // [{key, name, duration, video, poster, category, subcategory}]
    const playbackTimes = {};

    const subcategories = (() => {
      return Object.keys(
        channels.reduce((acc, channel) => {
          acc[channel.subcategory] = true;
          return acc;
        }, {})
      );
    })();

    const formatTime = (date) => date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });

    const shuffleArray = (array) => {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    };

    const checkMediaURL = (url, type = 'video') => {
      return new Promise((resolve) => {
        if (!url) return resolve(false);

        if (type === 'video') {
          const v = document.createElement('video');
          v.preload = 'metadata';
          v.onloadedmetadata = () => resolve(true);
          v.onerror = () => resolve(false);
          v.src = url;
        } else {
          const img = new Image();
          img.onload = () => resolve(true);
          img.onerror = () => resolve(false);
          img.src = url;
        }
      });
    };

    const buildGuideTimes = (items, start = new Date()) => {
      let t = new Date(start);
      return items.map(item => {
        const startTime = new Date(t);
        t.setMinutes(t.getMinutes() + (item.duration || 30));
        return { item, startTime };
      });
    };

    const renderQueueTVGuide = () => {
      tvGuideList.innerHTML = '';
      if (!tvQueue.length) return;

      const now = tvQueue[0];
      categoryInfo.textContent = `Category: ${now.category}`;
      subcategoryInfo.textContent = `Playing: ${now.subcategory}`;

      const scheduled = buildGuideTimes(tvQueue, new Date());
      scheduled.forEach(({ item, startTime }, idx) => {
        const li = document.createElement('li');
        li.textContent = `${formatTime(startTime)} - ${item.name}`;

        li.setAttribute('data-duration', item.duration || 30);
        li.setAttribute('data-video', item.video);
        li.setAttribute('data-poster', item.poster || 'assets/images/default_poster.jpg');
        li.setAttribute('data-start-time', startTime.getTime());

        if (idx === 0) li.classList.add('now-playing');
        else if (idx === 1) li.classList.add('up-next');

        tvGuideList.appendChild(li);
      });
    };

    const FALLBACK_POSTER = 'assets/images/default_poster.jpg';
    let globalPlayableCache = null;
    let lastGlobalPickKey = null;

    const preShuffledChannels = channels.map(channel => {
      const shuffledEpisodes =
        channel.episodes && channel.episodes.length > 0
          ? shuffleArray([...channel.episodes])
          : null;
      return { ...channel, episodes: shuffledEpisodes };
    });

    const buildGlobalPool = () => {
      const pool = [];
      for (const ch of preShuffledChannels) {
        if (ch.episodes && ch.episodes.length) {
          for (const ep of ch.episodes) {
            pool.push({
              key: `${ch.subcategory || ch.name}::${ep.name || ep.video || ch.video}`,
              category: ch.category || 'Uncategorized',
              subcategory: ch.subcategory || ch.name || 'Unknown',
              name: ep.name || ch.name || 'Untitled',
              duration: ep.duration || ch.duration || 30,
              video: ep.video || ch.video,
              poster: ch.poster || FALLBACK_POSTER
            });
          }
        } else {
          pool.push({
            key: `${ch.subcategory || ch.name}::${ch.name || ch.video}`,
            category: ch.category || 'Uncategorized',
            subcategory: ch.subcategory || ch.name || 'Unknown',
            name: ch.name || 'Untitled',
            duration: ch.duration || 30,
            video: ch.video,
            poster: ch.poster || FALLBACK_POSTER
          });
        }
      }
      return pool;
    };

    const getGlobalPlayable = async () => {
      if (globalPlayableCache) return globalPlayableCache;

      const pool = buildGlobalPool();
      const playable = [];

      for (const item of pool) {
        const videoOK = await checkMediaURL(item.video, 'video');
        if (!videoOK) continue;

        const posterOK = await checkMediaURL(item.poster, 'image');
        if (!posterOK) item.poster = FALLBACK_POSTER;

        playable.push(item);
      }

      globalPlayableCache = playable;
      return playable;
    };

    const pickRandomFrom = (arr, avoidKey = null) => {
      if (!arr.length) return null;
      if (arr.length === 1) return arr[0];

      let pick = null;
      for (let tries = 0; tries < 10; tries++) {
        const candidate = arr[Math.floor(Math.random() * arr.length)];
        if (!avoidKey || candidate.key !== avoidKey) {
          pick = candidate;
          break;
        }
      }
      return pick || arr[Math.floor(Math.random() * arr.length)];
    };

    const fillQueue = async (reset = false) => {
      const playable = await getGlobalPlayable();
      if (!playable.length) {
        showNotification('No playable media found in library.', 'red');
        return;
      }

      if (reset) tvQueue = [];

      while (tvQueue.length < GUIDE_DEPTH) {
        const avoidKey = tvQueue.length ? tvQueue[tvQueue.length - 1].key : lastGlobalPickKey;
        const pick = pickRandomFrom(playable, avoidKey);
        if (!pick) break;
        if (tvQueue.length && pick.key === tvQueue[tvQueue.length - 1].key) continue;
        tvQueue.push(pick);
      }

      renderQueueTVGuide();
    };

    const playNowFromQueue = async () => {
      if (!tvQueue.length) return;
      const now = tvQueue[0];

      poster.src = now.poster || FALLBACK_POSTER;

      if (videoPlayer.src !== now.video) {
        videoPlayer.src = now.video;
        videoPlayer.load();
      }

      videoPlayer.currentTime = 0;

      try { await videoPlayer.play(); } catch (e) {}
      lastGlobalPickKey = now.key;
    };

    const shuffleAll = async () => {
      await fillQueue(true);
      await playNowFromQueue();
      showNotification('Shuffled (All Categories)', 'limegreen');
    };

    const synchronizePlayback = () => {
      const currentTime = new Date().getTime();
      const guideItems = document.querySelectorAll('.tv-guide li');

      for (let i = 0; i < guideItems.length; i++) {
        const item = guideItems[i];
        const startTime = parseInt(item.getAttribute('data-start-time'), 10);
        const duration = parseInt(item.getAttribute('data-duration'), 10) * 60000;
        const endTime = startTime + duration;

        if (currentTime >= startTime && currentTime < endTime) {
          const videoSrc = item.getAttribute('data-video');
          const posterSrc = item.getAttribute('data-poster');
          const elapsedTime = (currentTime - startTime) / 1000;

          if (videoPlayer.src !== videoSrc) {
            videoPlayer.src = videoSrc;
            videoPlayer.load();
            videoPlayer.currentTime = elapsedTime;
            videoPlayer.play().catch(() => {});
          }

          if (poster.src !== posterSrc) poster.src = posterSrc;

          guideItems.forEach(x => x.classList.remove('now-playing', 'up-next'));
          item.classList.add('now-playing');
          if (guideItems[i + 1]) guideItems[i + 1].classList.add('up-next');
          break;
        }
      }
    };

    const showNotification = (message, color = 'limegreen') => {
      const notification = document.querySelector('.notification');

      notification.textContent = message;
      notification.style.color = color;
      notification.style.display = 'block';
      notification.style.opacity = '1';

      setTimeout(() => {
        notification.style.opacity = '0';
        setTimeout(() => {
          notification.style.display = 'none';
          notification.style.opacity = '1';
        }, 500);
      }, 3000);
    };

    const showVolumeIndicator = (volume) => {
      const notification = document.querySelector('.notification');
      const volumePercent = Math.round(volume * 100);

      notification.textContent = `Volume: ${volumePercent}%`;
      notification.style.color = volumePercent === 0 ? 'red' : 'limegreen';
      notification.style.display = 'block';

      setTimeout(() => {
        notification.style.opacity = '0';
        setTimeout(() => {
          notification.style.display = 'none';
          notification.style.opacity = '1';
        }, 500);
      }, 1000);
    };

    // EVENTS
    shuffleButton.addEventListener('click', shuffleAll);

    document.getElementById('volume-up').addEventListener('click', () => {
      videoPlayer.volume = Math.min(videoPlayer.volume + 0.1, 1);
      showVolumeIndicator(videoPlayer.volume);
    });

    document.getElementById('volume-down').addEventListener('click', () => {
      videoPlayer.volume = Math.max(videoPlayer.volume - 0.1, 0);
      showVolumeIndicator(videoPlayer.volume);
    });

    // When a video ends: pop queue head, refill to depth, play next
    videoPlayer.addEventListener('ended', async () => {
      tvQueue.shift();
      await fillQueue(false);
      await playNowFromQueue();
    });

    // Keep guide "now playing" in sync
    videoPlayer.addEventListener('timeupdate', synchronizePlayback);

    // POWER TOGGLE
    let isPoweredOn = true;

    powerButton.addEventListener('click', () => {
      isPoweredOn = !isPoweredOn;

      if (!isPoweredOn) {
        powerLight.style.background = 'red';
        powerLight.style.boxShadow = '0 0 15px red';

        screenOffOverlay.style.display = 'flex';
        staticOverlay.style.display = 'block';
        staticOverlay.play().catch(() => {});

        videoPlayer.pause();
      } else {
        powerLight.style.background = 'green';
        powerLight.style.boxShadow = '0 0 15px green';

        screenOffOverlay.style.display = 'none';
        staticOverlay.pause();
        staticOverlay.style.display = 'none';

        videoPlayer.play().catch(() => {});
      }
    });

    // Initial load
    shuffleAll();
  </script>
</body>
</html>
