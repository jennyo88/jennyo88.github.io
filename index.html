<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro TV</title>
    <style>
        body {
            font-family: Helvetica, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #333;
            color: #fff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: row;
            height: 100vh;
            width: 100vw;
        }

        .video-section {
            position: relative;
            width: 70%;
            height: 100%;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tv-container {
            width: 700px;
            height: 550px;
            position: relative;
        }

        .tv-screen {
            position: absolute;
            top: 9%;
            left: 7%;
            width: 86%;
            height: 72%;
            overflow: hidden;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.2), rgba(0, 0, 0, 0.8) 70%, black 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.5s ease-in-out;
        }

        .tv-screen.on {
            background: none;
        }

        video {
            width: 78%;
            height: 78%;
            object-fit: contain;
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }


        .power-off {
            background: radial-gradient(circle, #000, #111 60%, #222 80%, #000 100%);
            width: 85%;
            height: 85%;
            position: absolute;
            top: 10%;
            left: 14%;
            z-index: 2;
            display: none;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.5em;
            pointer-events: none;
        }

        .tv-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('./assets/images/tvbackclean.webp') no-repeat center center;
            background-size: contain;
            z-index: 3;
        }

        .sidebar {
            width: 30%;
            background: #333; /* Darker background for retro contrast */
            display: flex;
            flex-direction: column;
            padding: 15px;
            overflow-y: auto;
            border-right: 3px solid #222; /* Simulate a retro TV frame */
            position: relative;
        }
        
        .sidebar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.1) 4px
            );
            pointer-events: none;
        }
        
        .tv-guide {
            margin-bottom: 15px;
            background: linear-gradient(to bottom, #555, #444); /* Add gradient for depth */
            border-radius: 10px;
            padding: 15px;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.6); /* Retro "glow" effect */
            color: #eee; /* Light text for contrast */
            font-family: 'Verdana', sans-serif; /* Retro font */
        }
        
        .tv-guide h2 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8); /* Add shadow for retro look */
            color: #ffcc00; /* Bright, nostalgic title color */
            text-transform: uppercase;
        }
        
        .tv-guide ul {
            list-style: none;
            padding: 0;
        }
        
        .tv-guide li {
            margin-bottom: 10px;
            padding: 10px;
            background: linear-gradient(to right, #666, #444); /* Subtle gradient */
            border-radius: 5px;
            font-size: 0.8rem;
            color: #fff;
            font-family: 'Courier New', monospace; /* Nostalgic typeface */
            display: flex;
            justify-content: space-between; /* Align time and title */
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s ease, background 0.2s ease;
        }
        
        .tv-guide li:hover {
            background: #777;
            transform: scale(1.05); /* Retro "pop-out" effect */
        }
        
        .tv-guide li.now-playing {
            background: #ffcc00; /* Bright highlight */
            color: #000;
            font-weight: bold;
            animation: glow 1s infinite alternate;
        }
        
        @keyframes glow {
            0% { box-shadow: 0 0 5px #ffcc00; }
            100% { box-shadow: 0 0 15px #ffcc00; }
        }
        
        .poster-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            background: linear-gradient(to top, #444, #222); /* Gradient for depth */
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
        }
        
        .poster-container img {
            width: 180px;
            height: 240px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .poster-container img:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8); /* Glow effect */
        }
        

        .button-panel {
            position: absolute;
            bottom: 13%;
            left: 35%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 6;
        }

        .button-panel button {
            width: 12px;
            height: 12px;
            background: radial-gradient(circle, rgba(192, 192, 192, 0.5), rgba(0, 0, 0, 0) 70%);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: background-color 0.2s ease, box-shadow 0.2s ease;
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.6),
                        inset 0 -1px 2px rgba(0, 0, 0, 0.4),
                        0 0 10px rgba(192, 192, 192, 0.6);
        }

        .button-panel button:hover {
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8),
                        0 0 30px rgba(192, 192, 192, 0.6);
        }

        .button-panel button:active {
            background: linear-gradient(145deg, #e0e0e0, #b0b0b0);
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.4),
                        0 0 5px rgba(255, 255, 255, 0.5);
        }

        /* Existing styles for the power button */
        #power {
            width: 25px;
            height: 25px;
            background: radial-gradient(circle, rgba(192, 192, 192, 0.5), rgba(0, 0, 0, 0) 70%);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: background-color 0.2s ease, box-shadow 0.2s ease;
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.6),
                        inset 0 -1px 2px rgba(0, 0, 0, 0.4),
                        0 0 15px rgba(192, 192, 192, 0.8);
        }
        
        /* Power light when powered on */
        #power-light {
            width: 25px;
            height: 25px;
            background: green;
            border-radius: 50%;
            box-shadow: 0 0 15px green;
            transition: box-shadow 0.3s ease, background-color 0.3s ease;
        }
        
        /* Power light when powered off */
        .power-off #power-light {
            background: red; /* Red overlay when powered off */
            box-shadow: 0 0 15px red;
        }
        
        /* Optional hover effect for button */
        #power:hover {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 0 30px rgba(192, 192, 192, 0.6);
        }

        .spacer {
            width: 41px;
            height: 10px;
        }

        .notification {
            position: fixed;
            top: 70%;
            left: 35%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            color: limegreen;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            border-radius: 5px;
            display: none;
            z-index: 15;
            text-align: center;
            animation: fadeInOut 3s ease;
        }

        @keyframes fadeInOut {
            0%, 90% {
                opacity: 1;
            }
            100% {
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .video-section {
                width: 100%;
                height: 60%;
            }

            .sidebar {
                width: 100%;
                height: 40%;
                flex-direction: row;
                padding: 10px;
            }

            .poster-container img {
                width: 150px;
                height: 200px;
            }

            .tv-guide ul {
                font-size: 0.8rem;
            }
        }

    </style>
</head>
<body>
    <!-- Main Interface -->
    <div class="container">
        <!-- Video Section -->
        <div class="video-section">
            <video id="video-player" controls></video>
            <div class="power-off"></div>
            <div class="tv-overlay"></div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar">
            <!-- TV Guide -->
            <div class="tv-guide" style="overflow-y: auto;">
                <h2>TV Guide</h2>
                <p id="category-info"></p>
                <p id="subcategory-info"></p>
                <ul id="tv-guide-list"></ul>
            </div>

            <!-- Poster Container -->
            <div class="poster-container" id="poster-container">
                <img id="poster" src="./assets/images/default_poster.jpg" alt="Channel Poster" >
            </div>
        </div>
    </div>

    <div id="static-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('./assets/videos/tv-static.mp4') center/cover; z-index: 1000;"></div>

    <!-- Button Panel -->
    <div class="button-panel">
        <div class="button-container">
            <button id="shuffle"></button>
        </div>
        <div class="button-container">
            <button id="volume-down"></button>
            <div class="button-label">Vol -</div>
        </div>
        <div class="button-container">
            <button id="volume-up"></button>
            <div class="button-label">Vol +</div>
        </div>
        <div class="button-container">
            <button id="channel-down"></button>
            <div class="button-label">Ch -</div>
        </div>
        <div class="button-container">
            <button id="channel-up"></button>
            <div class="button-label">Ch +</div>
        </div>
        <div class="button-container-large">
            <div id="power-light"></div>
        </div>
        <div class="spacer"></div>
        <div class="button-container-large">
            <button id="power"></button>
        </div>
    </div>

    <!-- Notification Area -->
    <div class="notification"></div>

    <!-- JavaScript for Interactivity -->
    <script src="./channels.js"></script>
    <script>
        const videoPlayer = document.getElementById('video-player');
        const GUIDE_DEPTH = 10;  // how many items to show (now + up next)
        const tvGuideList = document.getElementById('tv-guide-list');
        const categoryInfo = document.getElementById('category-info');
        const subcategoryInfo = document.getElementById('subcategory-info');
        const shuffleButton = document.getElementById('shuffle');
        const powerButton = document.getElementById('power');
        const powerLight = document.getElementById('power-light');
        const powerOverlay = document.querySelector('.power-off');
        const poster = document.getElementById('poster');
    
        let currentChannelIndex = 0;
        let currentStartTime = new Date();
        let lastShuffleIndex = -1;
        let tvQueue = [];  // [{key, name, duration, video, poster, category, subcategory}]
        const playbackTimes = {}; // store playback per subcategory
    
        // build unique subcategories from channels.js
        const subcategories = (() => {
            return Object.keys(
                channels.reduce((acc, channel) => {
                    acc[channel.subcategory] = true;
                    return acc;
                }, {})
            );
        })();
    
        const formatTime = (date) => {
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        };
    
        const shuffleArray = (array) => {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        };

        // check media
        const checkMediaURL = (url, type = 'video') => {
            return new Promise((resolve) => {
                if (!url) return resolve(false);

                if (type === 'video') {
                    const video = document.createElement('video');
                    video.preload = 'metadata';
        
                    video.onloadedmetadata = () => resolve(true);
                    video.onerror = () => resolve(false);
        
                    video.src = url;
                } else {
                    const img = new Image();
                    img.onload = () => resolve(true);
                    img.onerror = () => resolve(false);
                    img.src = url;
                }
            });
        };

        const buildGuideTimes = (items, start = new Date()) => {
          let t = new Date(start);
          return items.map(item => {
            const startTime = new Date(t);
            t.setMinutes(t.getMinutes() + (item.duration || 30));
            return { item, startTime };
          });
        };

        const renderQueueTVGuide = () => {
          tvGuideList.innerHTML = '';
          if (!tvQueue.length) return;
        
          // show what we're playing (from the queue head)
          const now = tvQueue[0];
          categoryInfo.textContent = `Category: ${now.category}`;
          subcategoryInfo.textContent = `Playing: ${now.subcategory}`;
        
          const scheduled = buildGuideTimes(tvQueue, new Date());
        
          scheduled.forEach(({ item, startTime }, idx) => {
            const li = document.createElement('li');
            li.textContent = `${formatTime(startTime)} - ${item.name}`;
        
            li.setAttribute('data-duration', item.duration || 30);
            li.setAttribute('data-video', item.video);
            li.setAttribute('data-poster', item.poster || 'assets/images/default_poster.jpg');
            li.setAttribute('data-start-time', startTime.getTime());
        
            if (idx === 0) li.classList.add('now-playing');
            else if (idx === 1) li.classList.add('up-next');
        
            tvGuideList.appendChild(li);
          });
        };
        
        const fillQueue = async (reset = false) => {
          const playable = await getGlobalPlayable();
          if (!playable.length) {
            showNotification('No playable media found in library.', 'red');
            return;
          }
        
          if (reset) tvQueue = [];
        
          // Fill until GUIDE_DEPTH
          while (tvQueue.length < GUIDE_DEPTH) {
            const avoidKey = tvQueue.length ? tvQueue[tvQueue.length - 1].key : lastGlobalPickKey;
            const pick = pickRandomFrom(playable, avoidKey);
        
            // prevent duplicates back-to-back
            if (tvQueue.length && pick.key === tvQueue[tvQueue.length - 1].key) continue;
        
            tvQueue.push(pick);
          }
        
          renderQueueTVGuide();
        };
        
        const playNowFromQueue = async () => {
          if (!tvQueue.length) return;
          const now = tvQueue[0];
        
          poster.src = now.poster || 'assets/images/default_poster.jpg';
        
          if (videoPlayer.src !== now.video) {
            videoPlayer.src = now.video;
            videoPlayer.load();
          }
        
          videoPlayer.currentTime = 0;
        
          try {
            await videoPlayer.play();
          } catch (e) {
            // autoplay may be blocked; user can press play
          }
        
          lastGlobalPickKey = now.key;
        };

    
        // playback helpers
        // ---- GLOBAL RANDOM PLAYBACK (ALL CATEGORIES) ----

        const FALLBACK_POSTER = 'assets/images/default_poster.jpg';
        let globalPlayableCache = null; // validated playable items
        let lastGlobalPickKey = null;
    
        const buildGlobalPool = () => {
            // Flatten channels + episodes into one list
            const pool = [];
            for (const ch of preShuffledChannels) {
              if (ch.episodes && ch.episodes.length) {
                for (const ep of ch.episodes) {
                  pool.push({
                    key: `${ch.subcategory || ch.name}::${ep.name || ep.video || ch.video}`,
                    category: ch.category || 'Uncategorized',
                    subcategory: ch.subcategory || ch.name || 'Unknown',
                    name: ep.name || ch.name || 'Untitled',
                    duration: ep.duration || ch.duration || 30,
                    video: ep.video || ch.video,
                    poster: ch.poster || FALLBACK_POSTER
                  });
                }
              } else {
                pool.push({
                  key: `${ch.subcategory || ch.name}::${ch.name || ch.video}`,
                  category: ch.category || 'Uncategorized',
                  subcategory: ch.subcategory || ch.name || 'Unknown',
                  name: ch.name || 'Untitled',
                  duration: ch.duration || 30,
                  video: ch.video,
                  poster: ch.poster || FALLBACK_POSTER
                });
              }
            }
            return pool;
          };
    
          const getGlobalPlayable = async () => {
            if (globalPlayableCache) return globalPlayableCache;
        
            const pool = buildGlobalPool();
            const playable = [];
        
            for (const item of pool) {
              const videoOK = await checkMediaURL(item.video, 'video');
              if (!videoOK) continue;
        
              const posterOK = await checkMediaURL(item.poster, 'image');
              if (!posterOK) item.poster = FALLBACK_POSTER;
        
              playable.push(item);
            }
    
            globalPlayableCache = playable;
            return playable;
          };
    
          const pickRandomFrom = (arr, avoidKey = null) => {
            if (!arr.length) return null;
            if (arr.length === 1) return arr[0];
        
            let pick = null;
            for (let tries = 0; tries < 10; tries++) {
              const candidate = arr[Math.floor(Math.random() * arr.length)];
              if (!avoidKey || candidate.key !== avoidKey) {
                pick = candidate;
                break;
              }
            }
            return pick || arr[Math.floor(Math.random() * arr.length)];
          };
    
          const renderGlobalGuide = (nowItem, playable, upNextCount = 8) => {
            tvGuideList.innerHTML = '';
        
            categoryInfo.textContent = `Category: ${nowItem.category}`;
            subcategoryInfo.textContent = `Playing: ${nowItem.subcategory}`;
        
            let startTime = new Date(); // guide relative to "now"
            const upNext = [];
            let avoid = nowItem.key;
        
            for (let i = 0; i < upNextCount; i++) {
              const next = pickRandomFrom(playable, avoid);
              if (!next) break;
              upNext.push(next);
              avoid = next.key;
            }
    
            const guideItems = [nowItem, ...upNext];
            guideItems.forEach((v, idx) => {
              const li = document.createElement('li');
              li.textContent = `${formatTime(startTime)} - ${v.name}`;
              li.setAttribute('data-duration', v.duration);
              li.setAttribute('data-video', v.video);
              li.setAttribute('data-poster', v.poster);
              li.setAttribute('data-start-time', startTime.getTime());
        
              if (idx === 0) li.classList.add('now-playing');
              else if (idx === 1) li.classList.add('up-next');
        
              tvGuideList.appendChild(li);
              startTime.setMinutes(startTime.getMinutes() + (v.duration || 30));
            });
          };
    
          const playGlobalItem = async (item) => {
            if (!item) return;
        
            // update UI
            poster.src = item.poster || FALLBACK_POSTER;
            categoryInfo.textContent = `Category: ${item.category}`;
            subcategoryInfo.textContent = `Playing: ${item.subcategory}`;
        
            // load & play
            if (videoPlayer.src !== item.video) {
              videoPlayer.src = item.video;
              videoPlayer.load();
            }
    
            // reset to start (since we're doing "simply play random")
            videoPlayer.currentTime = 0;
        
            try {
              await videoPlayer.play();
            } catch (e) {
              // autoplay might be blocked; user can hit play
            }
          };
        
          const shuffleAll = async () => {
              await fillQueue(true);     // rebuild brand-new random guide
              await playNowFromQueue();  // play "Now Playing"
              showNotification('Shuffled (All Categories)', 'limegreen');
            };

        const updatePlaybackTime = (subcategory) => {
            playbackTimes[subcategory] = videoPlayer.currentTime || 0;
        };
    
        const restorePlaybackTime = (subcategory) => {
            if (playbackTimes[subcategory] != null) {
                videoPlayer.currentTime = playbackTimes[subcategory];
            }
        };
    
        // pre-shuffle episodes so the guide is consistent
        const preShuffledChannels = channels.map(channel => {
            const shuffledEpisodes =
                channel.episodes && channel.episodes.length > 0
                    ? shuffleArray([...channel.episodes])
                    : null;
            return {
                ...channel,
                episodes: shuffledEpisodes
            };
        });
    
        // cache per-subcategory shuffled "guide videos"
        let shuffledVideosCache = {};
    
        const populateTVGuide = async (subcategory) => {
            tvGuideList.innerHTML = '';
    
            const channelsInSubcategory = preShuffledChannels.filter(
                channel => channel.subcategory === subcategory
            );
    
            if (channelsInSubcategory.length === 0) {
                console.error(`Subcategory "${subcategory}" not found in channels.`);
                subcategoryInfo.textContent = 'Subcategory not found.';
                return;
            }
    
            categoryInfo.textContent = `Category: ${channelsInSubcategory[0].category}`;
            subcategoryInfo.textContent = `Playing: ${subcategory}`;
    
            let startTime = new Date(currentStartTime);
    
            // only build / shuffle once per subcategory
            if (!shuffledVideosCache[subcategory]) {
                shuffledVideosCache[subcategory] = shuffleArray(
                    channelsInSubcategory.flatMap(channel => {
                        const channelVideos =
                            channel.episodes && channel.episodes.length > 0
                                ? channel.episodes.map(episode => ({
                                      name: episode.name || 'Unnamed Episode',
                                      duration: episode.duration || 30,
                                      video: episode.video || channel.video,
                                      poster:
                                          channel.poster ||
                                          'assets/images/default_poster.jpg'
                                  }))
                                : [
                                      {
                                          name: channel.name || 'Untitled',
                                          duration: channel.duration || 30,
                                          video: channel.video,
                                          poster:
                                              channel.poster ||
                                              'assets/images/default_poster.jpg'
                                      }
                                  ];
                        return channelVideos;
                    })
                );
            }
    
            const videos = [];

            for (const video of shuffledVideosCache[subcategory]) {
                const videoOK = await checkMediaURL(video.video, 'video');
                const posterOK = await checkMediaURL(video.poster, 'image');
            
                if (!videoOK) {
                    console.warn('❌ Broken video:', video.video);
                    continue;
                }
            
                if (!posterOK) {
                    console.warn('⚠️ Broken poster, using fallback:', video.poster);
                    video.poster = 'assets/images/default_poster.jpg';
                }
            
                videos.push(video);
            }
            
            if (videos.length === 0) {
                showNotification(`No playable media in ${subcategory}`, 'red');
                return;
            }

    
            videos.forEach((video, index) => {
                const listItem = document.createElement('li');
                listItem.textContent = `${formatTime(startTime)} - ${video.name}`;
                listItem.setAttribute('data-duration', video.duration);
                listItem.setAttribute('data-video', video.video);
                listItem.setAttribute('data-poster', video.poster);
                listItem.setAttribute('data-start-time', startTime.getTime());
    
                if (index === 0) {
                    listItem.classList.add('now-playing');
                } else if (index === 1) {
                    listItem.classList.add('up-next');
                }
    
                tvGuideList.appendChild(listItem);
                startTime.setMinutes(startTime.getMinutes() + video.duration);
            });
        };
    
        const synchronizePlayback = () => {
            const currentTime = new Date().getTime();
            const guideItems = document.querySelectorAll('.tv-guide li');
    
            for (let i = 0; i < guideItems.length; i++) {
                const item = guideItems[i];
                const startTime = parseInt(item.getAttribute('data-start-time'), 10);
                const duration = parseInt(item.getAttribute('data-duration'), 10) * 60000;
                const endTime = startTime + duration;
    
                if (currentTime >= startTime && currentTime < endTime) {
                    const videoSrc = item.getAttribute('data-video');
                    const posterSrc = item.getAttribute('data-poster');
    
                    const elapsedTime = (currentTime - startTime) / 1000;
    
                    if (videoPlayer.src !== videoSrc) {
                        videoPlayer.src = videoSrc;
                        videoPlayer.load();
                        videoPlayer.currentTime = elapsedTime;
    
                        videoPlayer
                            .play()
                            .catch(err => {
                                if (err.name !== 'AbortError') {
                                    console.error('Error starting video:', err);
                                }
                            });
                    }
    
                    if (poster.src !== posterSrc) {
                        poster.src = posterSrc;
                    }
    
                    guideItems.forEach(item =>
                        item.classList.remove('now-playing', 'up-next')
                    );
                    item.classList.add('now-playing');
    
                    if (guideItems[i + 1]) {
                        guideItems[i + 1].classList.add('up-next');
                    }
    
                    break;
                }
            }
        };
    
        const showNotification = (message, color = 'limegreen') => {
            const notification = document.querySelector('.notification');
    
            notification.textContent = message;
            notification.style.color = color;
            notification.style.display = 'block';
            notification.style.transition = 'opacity 0.5s ease';
            notification.style.opacity = '1';
    
            setTimeout(() => {
                notification.style.opacity = '0';
                setTimeout(() => {
                    notification.style.display = 'none';
                }, 500);
            }, 3000);
        };
    
        const setChannel = (index) => {
            if (index < 0 || index >= subcategories.length) {
                console.error('Index out of bounds for subcategories');
                return;
            }
    
            currentChannelIndex = (index + subcategories.length) % subcategories.length;
            const subcategory = subcategories[currentChannelIndex];
            const channel = preShuffledChannels.find(
                channel => channel.subcategory === subcategory
            );
    
            if (!channel) {
                console.error(`No channel found for subcategory: ${subcategory}`);
                showNotification(
                    `No videos available for subcategory: ${subcategory}`,
                    'red'
                );
                return;
            }
    
            populateTVGuide(subcategory);
    
            // make sure playback is aligned after the DOM updates
            setTimeout(() => {
                synchronizePlayback();
            }, 0);
    
            // set poster to the first video in the shuffled list
            const firstVideo = shuffledVideosCache[subcategory]?.[0];
            poster.src =
                firstVideo?.poster ||
                channel.poster ||
                'assets/images/default_poster.jpg';
    
            showNotification(`Switched to Channel: ${channel.subcategory}`, 'limegreen');
        };
    
        const shuffleChannels = () => {
            if (!subcategories || subcategories.length === 0) {
                showNotification('Error: No subcategories available to shuffle.', 'red');
                return;
            }
    
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * subcategories.length);
            } while (randomIndex === lastShuffleIndex && subcategories.length > 1);
    
            lastShuffleIndex = randomIndex;
            setChannel(randomIndex);
    
            const channel = preShuffledChannels.find(
                channel => channel.subcategory === subcategories[randomIndex]
            );
            if (channel) {
                showNotification(
                    `Shuffled to Channel: ${channel.subcategory}`,
                    'limegreen'
                );
            } else {
                showNotification('Error: Could not find channel details.', 'red');
            }
        };
    
        const showVolumeIndicator = (volume) => {
            const notification = document.querySelector('.notification');
            const volumePercent = Math.round(volume * 100);
    
            notification.textContent = `Volume: ${volumePercent}%`;
            notification.style.color =
                volumePercent === 0 ? 'red' : 'limegreen';
            notification.style.display = 'block';
    
            setTimeout(() => {
                notification.style.transition = 'opacity 0.5s ease';
                notification.style.opacity = '0';
                setTimeout(() => {
                    notification.style.display = 'none';
                    notification.style.opacity = '1';
                }, 500);
            }, 1000);
        };
    
        // button events
        shuffleButton.addEventListener('click', shuffleAll);
    
        document.getElementById('channel-up').addEventListener('click', () => {
            setChannel(currentChannelIndex + 1);
            const channel = preShuffledChannels.find(
                channel => channel.subcategory === subcategories[currentChannelIndex]
            );
            if (channel) {
                showNotification(`Channel up: ${channel.subcategory}`, 'limegreen');
            } else {
                showNotification('Channel up: No channel found', 'red');
            }
        });
    
        document.getElementById('channel-down').addEventListener('click', () => {
            setChannel(currentChannelIndex - 1);
            const channel = preShuffledChannels.find(
                channel => channel.subcategory === subcategories[currentChannelIndex]
            );
            if (channel) {
                showNotification(`Channel down: ${channel.subcategory}`, 'limegreen');
            } else {
                showNotification('Channel down: No channel found', 'red');
            }
        });
    
        videoPlayer.addEventListener('ended', async () => {
          // remove the thing we just finished
          tvQueue.shift();
        
          // add one more random item to the end and re-render guide
          await fillQueue(false);
        
          // play the new "now playing"
          await playNowFromQueue();
        });
    
        document.getElementById('volume-up').addEventListener('click', () => {
            videoPlayer.volume = Math.min(videoPlayer.volume + 0.1, 1);
            showVolumeIndicator(videoPlayer.volume);
        });
    
        document.getElementById('volume-down').addEventListener('click', () => {
            videoPlayer.volume = Math.max(videoPlayer.volume - 0.1, 0);
            showVolumeIndicator(videoPlayer.volume);
        });
    
        // power toggle
        powerButton.addEventListener('click', () => {
            const isPoweredOn = powerOverlay.style.display === 'none';
    
            // toggle overlay
            powerOverlay.style.display = isPoweredOn ? 'block' : 'none';
    
            if (isPoweredOn) {
                // going OFF
                powerLight.style.background = 'red';
                powerLight.style.boxShadow = '0 0 15px red';
                videoPlayer.pause();
            } else {
                // going ON
                powerLight.style.background = 'green';
                powerLight.style.boxShadow = '0 0 15px green';
                videoPlayer.play().catch(() => {});
            }
        });
    
        // keep guide in sync while playing
        videoPlayer.addEventListener('timeupdate', synchronizePlayback);
    
        // initial load
        shuffleAll();
    </script>


</body>
</html>
