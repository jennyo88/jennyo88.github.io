<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro TV</title>
    <style>
        body {
            font-family: Helvetica, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #333;
            color: #fff;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: row;
            height: 100vh;
            width: 100vw;
        }

        .video-section {
            position: relative;
            width: 70%;
            height: 100%;
            background-color: black;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .tv-container {
            width: 700px;
            height: 550px;
            position: relative;
        }

        .tv-screen {
            position: absolute;
            top: 9%;
            left: 7%;
            width: 86%;
            height: 72%;
            overflow: hidden;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.2), rgba(0, 0, 0, 0.8) 70%, black 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            transition: background 0.5s ease-in-out;
        }

        .tv-screen.on {
            background: none;
        }

        video {
            width: 78%;
            height: 78%;
            object-fit: contain;
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }


        .power-off {
            background: radial-gradient(circle, #000, #111 60%, #222 80%, #000 100%);
            width: 85%;
            height: 85%;
            position: absolute;
            top: 10%;
            left: 14%;
            z-index: 2;
            display: none;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 1.5em;
            pointer-events: none;
        }

        .tv-overlay {
            position: absolute;
            width: 100%;
            height: 100%;
            background: url('./assets/images/tvbackclean.webp') no-repeat center center;
            background-size: contain;
            z-index: 3;
        }

        .sidebar {
            width: 30%;
            background: #333; /* Darker background for retro contrast */
            display: flex;
            flex-direction: column;
            padding: 15px;
            overflow-y: auto;
            border-right: 3px solid #222; /* Simulate a retro TV frame */
            position: relative;
        }
        
        .sidebar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                transparent,
                transparent 2px,
                rgba(0, 0, 0, 0.1) 4px
            );
            pointer-events: none;
        }
        
        .tv-guide {
            margin-bottom: 15px;
            background: linear-gradient(to bottom, #555, #444); /* Add gradient for depth */
            border-radius: 10px;
            padding: 15px;
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.6); /* Retro "glow" effect */
            color: #eee; /* Light text for contrast */
            font-family: 'Verdana', sans-serif; /* Retro font */
        }
        
        .tv-guide h2 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8); /* Add shadow for retro look */
            color: #ffcc00; /* Bright, nostalgic title color */
            text-transform: uppercase;
        }
        
        .tv-guide ul {
            list-style: none;
            padding: 0;
        }
        
        .tv-guide li {
            margin-bottom: 10px;
            padding: 10px;
            background: linear-gradient(to right, #666, #444); /* Subtle gradient */
            border-radius: 5px;
            font-size: 0.8rem;
            color: #fff;
            font-family: 'Courier New', monospace; /* Nostalgic typeface */
            display: flex;
            justify-content: space-between; /* Align time and title */
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
            transition: transform 0.2s ease, background 0.2s ease;
        }
        
        .tv-guide li:hover {
            background: #777;
            transform: scale(1.05); /* Retro "pop-out" effect */
        }
        
        .tv-guide li.now-playing {
            background: #ffcc00; /* Bright highlight */
            color: #000;
            font-weight: bold;
            animation: glow 1s infinite alternate;
        }
        
        @keyframes glow {
            0% { box-shadow: 0 0 5px #ffcc00; }
            100% { box-shadow: 0 0 15px #ffcc00; }
        }
        
        .poster-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            background: linear-gradient(to top, #444, #222); /* Gradient for depth */
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.7);
        }
        
        .poster-container img {
            width: 180px;
            height: 240px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        
        .poster-container img:hover {
            transform: scale(1.1);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8); /* Glow effect */
        }
        

        .button-panel {
            position: absolute;
            bottom: 13%;
            left: 35%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 6;
        }

        .button-panel button {
            width: 12px;
            height: 12px;
            background: radial-gradient(circle, rgba(192, 192, 192, 0.5), rgba(0, 0, 0, 0) 70%);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: background-color 0.2s ease, box-shadow 0.2s ease;
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.6),
                        inset 0 -1px 2px rgba(0, 0, 0, 0.4),
                        0 0 10px rgba(192, 192, 192, 0.6);
        }

        .button-panel button:hover {
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.8),
                        0 0 30px rgba(192, 192, 192, 0.6);
        }

        .button-panel button:active {
            background: linear-gradient(145deg, #e0e0e0, #b0b0b0);
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.4),
                        0 0 5px rgba(255, 255, 255, 0.5);
        }

        /* Existing styles for the power button */
        #power {
            width: 25px;
            height: 25px;
            background: radial-gradient(circle, rgba(192, 192, 192, 0.5), rgba(0, 0, 0, 0) 70%);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            transition: background-color 0.2s ease, box-shadow 0.2s ease;
            box-shadow: inset 0 1px 2px rgba(255, 255, 255, 0.6),
                        inset 0 -1px 2px rgba(0, 0, 0, 0.4),
                        0 0 15px rgba(192, 192, 192, 0.8);
        }
        
        /* Power light when powered on */
        #power-light {
            width: 25px;
            height: 25px;
            background: green;
            border-radius: 50%;
            box-shadow: 0 0 15px green;
            transition: box-shadow 0.3s ease, background-color 0.3s ease;
        }
        
        /* Power light when powered off */
        .power-off #power-light {
            background: red; /* Red overlay when powered off */
            box-shadow: 0 0 15px red;
        }
        
        /* Optional hover effect for button */
        #power:hover {
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 0 30px rgba(192, 192, 192, 0.6);
        }

        .spacer {
            width: 41px;
            height: 10px;
        }

        .notification {
            position: fixed;
            top: 70%;
            left: 35%;
            transform: translate(-50%, -50%);
            font-size: 14px;
            color: limegreen;
            background: rgba(0, 0, 0, 0.8);
            padding: 10px 20px;
            border-radius: 5px;
            display: none;
            z-index: 15;
            text-align: center;
            animation: fadeInOut 3s ease;
        }

        @keyframes fadeInOut {
            0%, 90% {
                opacity: 1;
            }
            100% {
                opacity: 0;
            }
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
            }

            .video-section {
                width: 100%;
                height: 60%;
            }

            .sidebar {
                width: 100%;
                height: 40%;
                flex-direction: row;
                padding: 10px;
            }

            .poster-container img {
                width: 150px;
                height: 200px;
            }

            .tv-guide ul {
                font-size: 0.8rem;
            }
        }

    </style>
</head>
<body>
    <!-- Main Interface -->
    <div class="container">
        <!-- Video Section -->
        <div class="video-section">
            <video id="video-player" controls></video>
            <div class="power-off"></div>
            <div class="tv-overlay"></div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar">
            <!-- TV Guide -->
            <div class="tv-guide" style="overflow-y: auto;">
                <h2>TV Guide</h2>
                <p id="category-info"></p>
                <p id="subcategory-info"></p>
                <ul id="tv-guide-list"></ul>
            </div>

            <!-- Poster Container -->
            <div class="poster-container" id="poster-container">
                <img id="poster" src="./assets/images/default_poster.jpg" alt="Channel Poster" >
            </div>
        </div>
    </div>

    <div id="static-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('./assets/videos/tv-static.mp4') center/cover; z-index: 1000;"></div>

    <!-- Button Panel -->
    <div class="button-panel">
        <div class="button-container">
            <button id="shuffle"></button>
        </div>
        <div class="button-container">
            <button id="volume-down"></button>
            <div class="button-label">Vol -</div>
        </div>
        <div class="button-container">
            <button id="volume-up"></button>
            <div class="button-label">Vol +</div>
        </div>
        <div class="button-container">
            <button id="channel-down"></button>
            <div class="button-label">Ch -</div>
        </div>
        <div class="button-container">
            <button id="channel-up"></button>
            <div class="button-label">Ch +</div>
        </div>
        <div class="button-container-large">
            <div id="power-light"></div>
        </div>
        <div class="spacer"></div>
        <div class="button-container-large">
            <button id="power"></button>
        </div>
    </div>

    <!-- Notification Area -->
    <div class="notification"></div>

    <!-- JavaScript for Interactivity -->
    <script src="./channels.js"></script>
    <script>
    /* ========= Retro TV - ALL-IN-ONE SCRIPT (randomize across ALL categories) =========
       - Assumes `channels` exists (loaded before this script, e.g. channels.js)
       - Your HTML already has:
         #video-player, #tv-guide-list, #category-info, #subcategory-info, #shuffle, #power, #power-light, .power-off, #poster
         #volume-up, #volume-down, #channel-up, #channel-down
    ================================================================================== */
    
    (() => {
      // ---- DOM ----
      const videoPlayer = document.getElementById('video-player');
      const tvGuideList = document.getElementById('tv-guide-list');
      const categoryInfo = document.getElementById('category-info');
      const subcategoryInfo = document.getElementById('subcategory-info');
      const shuffleButton = document.getElementById('shuffle');
      const powerButton = document.getElementById('power');
      const powerLight = document.getElementById('power-light');
      const powerOverlay = document.querySelector('.power-off');
      const poster = document.getElementById('poster');
    
      const btnVolUp = document.getElementById('volume-up');
      const btnVolDown = document.getElementById('volume-down');
      const btnChUp = document.getElementById('channel-up');
      const btnChDown = document.getElementById('channel-down');
    
      // ---- GUARDS ----
      if (!videoPlayer || !tvGuideList || !categoryInfo || !subcategoryInfo || !shuffleButton) {
        console.error('Missing required DOM elements for Retro TV.');
        return;
      }
      if (!Array.isArray(window.channels)) {
        console.error('`channels` is not defined. Make sure channels.js is loaded BEFORE this script.');
        return;
      }
    
      // ---- STATE ----
      const FALLBACK_POSTER = 'assets/images/default_poster.jpg';
      let lastGlobalPickKey = null;
    
      // "Channel" buttons can optionally jump around a "station list"
      let stationIndex = 0;
      const stations = (() => {
        const set = new Set();
        for (const ch of channels) set.add(ch.subcategory || ch.name || 'Unknown');
        return Array.from(set);
      })();
    
      // Cache of validated playable items (global)
      let globalPlayableCache = null;
    
      // ---- UTILS ----
      const formatTime = (date) => date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    
      const showNotification = (message, color = 'limegreen') => {
        const notification = document.querySelector('.notification');
        if (!notification) return;
        notification.textContent = message;
        notification.style.color = color;
        notification.style.display = 'block';
        notification.style.transition = 'opacity 0.5s ease';
        notification.style.opacity = '1';
    
        setTimeout(() => {
          notification.style.opacity = '0';
          setTimeout(() => {
            notification.style.display = 'none';
            notification.style.opacity = '1';
          }, 500);
        }, 2000);
      };
    
      const checkMediaURL = (url, type = 'video') => {
        return new Promise((resolve) => {
          if (!url) return resolve(false);
    
          if (type === 'video') {
            const v = document.createElement('video');
            v.preload = 'metadata';
            v.onloadedmetadata = () => resolve(true);
            v.onerror = () => resolve(false);
            v.src = url;
          } else {
            const img = new Image();
            img.onload = () => resolve(true);
            img.onerror = () => resolve(false);
            img.src = url;
          }
        });
      };
    
      const pickRandomFrom = (arr, avoidKey = null) => {
        if (!arr || arr.length === 0) return null;
        if (arr.length === 1) return arr[0];
    
        let pick = null;
        for (let tries = 0; tries < 12; tries++) {
          const candidate = arr[Math.floor(Math.random() * arr.length)];
          if (!avoidKey || candidate.key !== avoidKey) {
            pick = candidate;
            break;
          }
        }
        return pick || arr[Math.floor(Math.random() * arr.length)];
      };
    
      // ---- BUILD GLOBAL POOL (all categories/subcategories) ----
      const buildGlobalPool = () => {
        const pool = [];
        for (const ch of channels) {
          const category = ch.category || 'Uncategorized';
          const subcategory = ch.subcategory || ch.name || 'Unknown';
          const channelName = ch.name || subcategory || 'Untitled';
          const posterSrc = ch.poster || FALLBACK_POSTER;
    
          if (Array.isArray(ch.episodes) && ch.episodes.length) {
            for (const ep of ch.episodes) {
              pool.push({
                key: `${subcategory}::${ep.name || ep.video || ch.video || Math.random()}`,
                category,
                subcategory,
                name: ep.name || channelName || 'Untitled',
                duration: ep.duration || ch.duration || 30,
                video: ep.video || ch.video,
                poster: posterSrc
              });
            }
          } else {
            pool.push({
              key: `${subcategory}::${channelName || ch.video || Math.random()}`,
              category,
              subcategory,
              name: channelName || 'Untitled',
              duration: ch.duration || 30,
              video: ch.video,
              poster: posterSrc
            });
          }
        }
        return pool;
      };
    
      const getGlobalPlayable = async () => {
        if (globalPlayableCache) return globalPlayableCache;
    
        const pool = buildGlobalPool();
        const playable = [];
    
        for (const item of pool) {
          const videoOK = await checkMediaURL(item.video, 'video');
          if (!videoOK) continue;
    
          const posterOK = await checkMediaURL(item.poster, 'image');
          if (!posterOK) item.poster = FALLBACK_POSTER;
    
          playable.push(item);
        }
    
        globalPlayableCache = playable;
        return playable;
      };
    
      // ---- GUIDE UI (Now Playing + randomized Up Next) ----
      const renderGlobalGuide = (nowItem, playable, upNextCount = 8) => {
        tvGuideList.innerHTML = '';
    
        categoryInfo.textContent = `Category: ${nowItem.category}`;
        subcategoryInfo.textContent = `Playing: ${nowItem.subcategory}`;
    
        const guideItems = [nowItem];
        let avoid = nowItem.key;
    
        for (let i = 0; i < upNextCount; i++) {
          const next = pickRandomFrom(playable, avoid);
          if (!next) break;
          guideItems.push(next);
          avoid = next.key;
        }
    
        let startTime = new Date();
        guideItems.forEach((v, idx) => {
          const li = document.createElement('li');
          li.textContent = `${formatTime(startTime)} - ${v.name}`;
          li.setAttribute('data-duration', v.duration);
          li.setAttribute('data-video', v.video);
          li.setAttribute('data-poster', v.poster);
          li.setAttribute('data-start-time', startTime.getTime());
    
          if (idx === 0) li.classList.add('now-playing');
          else if (idx === 1) li.classList.add('up-next');
    
          tvGuideList.appendChild(li);
          startTime.setMinutes(startTime.getMinutes() + (v.duration || 30));
        });
      };
    
      // ---- PLAYBACK ----
      const playGlobalItem = async (item) => {
        if (!item) return;
    
        // poster + labels
        if (poster) poster.src = item.poster || FALLBACK_POSTER;
        categoryInfo.textContent = `Category: ${item.category}`;
        subcategoryInfo.textContent = `Playing: ${item.subcategory}`;
    
        // load + play from start
        if (videoPlayer.src !== item.video) {
          videoPlayer.src = item.video;
          videoPlayer.load();
        }
        videoPlayer.currentTime = 0;
    
        try {
          await videoPlayer.play();
        } catch (_) {
          // Autoplay may be blocked; user interaction (shuffle/power/play) will allow.
        }
      };
    
      const shuffleAll = async () => {
        const playable = await getGlobalPlayable();
        if (!playable.length) {
          showNotification('No playable media found in library.', 'red');
          return;
        }
    
        const pick = pickRandomFrom(playable, lastGlobalPickKey);
        lastGlobalPickKey = pick.key;
    
        renderGlobalGuide(pick, playable);
        await playGlobalItem(pick);
    
        showNotification(`Shuffled (All): ${pick.subcategory}`, 'limegreen');
      };
    
      // ---- OPTIONAL: "Channel" buttons jump between subcategories, but still randomize within that station ----
      const getPlayableByStation = async (stationName) => {
        const playable = await getGlobalPlayable();
        return playable.filter((x) => x.subcategory === stationName);
      };
    
      const tuneStation = async (idx) => {
        if (!stations.length) return;
        stationIndex = (idx + stations.length) % stations.length;
        const station = stations[stationIndex];
    
        const stationPlayable = await getPlayableByStation(station);
        if (!stationPlayable.length) {
          showNotification(`No playable media in: ${station}`, 'red');
          return;
        }
    
        const pick = pickRandomFrom(stationPlayable, lastGlobalPickKey);
        lastGlobalPickKey = pick.key;
    
        renderGlobalGuide(pick, stationPlayable);
        await playGlobalItem(pick);
        showNotification(`Channel: ${station}`, 'limegreen');
      };
    
      // ---- VOLUME ----
      const showVolumeIndicator = (volume) => {
        const notification = document.querySelector('.notification');
        if (!notification) return;
    
        const volumePercent = Math.round(volume * 100);
        notification.textContent = `Volume: ${volumePercent}%`;
        notification.style.color = volumePercent === 0 ? 'red' : 'limegreen';
        notification.style.display = 'block';
    
        setTimeout(() => {
          notification.style.transition = 'opacity 0.5s ease';
          notification.style.opacity = '0';
          setTimeout(() => {
            notification.style.display = 'none';
            notification.style.opacity = '1';
          }, 500);
        }, 900);
      };
    
      // ---- POWER ----
      const isPoweredOn = () => powerOverlay && powerOverlay.style.display === 'none';
    
      const setPower = (on) => {
        if (!powerOverlay || !powerLight) return;
    
        powerOverlay.style.display = on ? 'none' : 'block';
    
        if (on) {
          powerLight.style.background = 'green';
          powerLight.style.boxShadow = '0 0 15px green';
          videoPlayer.play().catch(() => {});
        } else {
          powerLight.style.background = 'red';
          powerLight.style.boxShadow = '0 0 15px red';
          videoPlayer.pause();
        }
      };
    
      // ---- EVENTS ----
      shuffleButton.addEventListener('click', shuffleAll);
    
      if (btnVolUp) {
        btnVolUp.addEventListener('click', () => {
          videoPlayer.volume = Math.min(videoPlayer.volume + 0.1, 1);
          showVolumeIndicator(videoPlayer.volume);
        });
      }
    
      if (btnVolDown) {
        btnVolDown.addEventListener('click', () => {
          videoPlayer.volume = Math.max(videoPlayer.volume - 0.1, 0);
          showVolumeIndicator(videoPlayer.volume);
        });
      }
    
      // Channel buttons: move station, randomize within that station
      if (btnChUp) btnChUp.addEventListener('click', () => tuneStation(stationIndex + 1));
      if (btnChDown) btnChDown.addEventListener('click', () => tuneStation(stationIndex - 1));
    
      // Auto-random (ALL categories) when current video ends
      videoPlayer.addEventListener('ended', () => {
        shuffleAll();
      });
    
      // Power toggle
      if (powerButton) {
        powerButton.addEventListener('click', () => {
          setPower(!isPoweredOn());
        });
      }
    
      // ---- INIT ----
      // Ensure overlay default: ON (if your CSS starts it hidden, we keep it)
      if (powerOverlay && powerOverlay.style.display === '') {
        powerOverlay.style.display = 'none';
      }
      if (powerLight && (!powerLight.style.background || powerLight.style.background === '')) {
        powerLight.style.background = 'green';
        powerLight.style.boxShadow = '0 0 15px green';
      }
    
      // Start with a global random pick
      shuffleAll();
    })();
    </script>


</body>
</html>
